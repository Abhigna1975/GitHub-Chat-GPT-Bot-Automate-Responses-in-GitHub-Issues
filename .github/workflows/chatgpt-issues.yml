name: ChatGPT Bot for Issues

on:
  issues:
    types: [opened, edited, commented]

jobs:
  chatgpt_response:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v2

    - name: Process issue with ChatGPT
      run: |
        curl -X POST "https://api.openai.com/v1/completions" \
        -H "Content-Type: application/json" \
        -H "Authorization: Bearer ${{ secrets.OPENAI_API_KEY }}" \
        -d '{
          "model": "text-davinci-003",
          "prompt": "You have an issue: ${{ github.event.issue.body }}. Provide a response.",
          "max_tokens": 500
        }' > response.json

        response=$(cat response.json | jq -r '.choices[0].text')
        echo "ChatGPT Response: $response"

        curl -X POST \
        -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
        -d '{"body": "'"$response"'"}' \
        "https://api.github.com/repos/${{ github.repository }}/issues/${{ github.event.issue.number }}/comments"
